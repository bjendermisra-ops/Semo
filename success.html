<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donation Successful</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #f7f9fa;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 15px;
            box-sizing: border-box;
            cursor: pointer; /* pure screen par click pointer dikhega */
            -webkit-tap-highlight-color: transparent;
        }
        .container {
            text-align: center;
            background: white;
            padding: 30px 20px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 380px;
            box-sizing: border-box;
        }
        h3 { margin: 0 0 10px 0; font-size: 18px; color: green; }
        p { margin: 0; font-size: 13px; color: #777; line-height: 1.4; }
        
        .receipt-box { border: 2px dashed #f28c28; background: #fffcf8; padding: 15px; border-radius: 10px; margin-top: 15px; text-align: left; }
        .receipt-row { display: flex; justify-content: space-between; margin: 8px 0; font-size: 13px; border-bottom: 1px solid #f9f9f9; padding-bottom: 5px; }
        .receipt-row span:first-child { font-weight: bold; color: #666; }
        
        /* Massive, Eye-Catching Pulsing Button (Bypasses Chrome Security on Tap) */
        .tap-action-btn {
            display: block;
            width: 100%;
            padding: 15px;
            background-color: #f28c28; 
            color: white;
            font-weight: bold;
            font-size: 15px;
            border-radius: 25px;
            margin-top: 20px;
            box-sizing: border-box;
            box-shadow: 0 4px 12px rgba(242, 140, 40, 0.4);
            animation: pulse 1.5s infinite;
            letter-spacing: 0.5px;
        }
        
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(242, 140, 40, 0.6); transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { box-shadow: 0 0 0 12px rgba(242, 140, 40, 0); transform: scale(1); }
        }
        
        .instruction-text { font-size: 11px; color: #888; margin-top: 10px; font-weight: bold; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="container">
        <div style="color: green; font-size: 50px; margin-bottom: 10px;">✓</div>
        <h3>Donation Successful</h3>
        <p>Thank you! Your transaction has been securely captured.</p>

        <div class="receipt-box">
            <div class="receipt-row"><span>Seva:</span> <span id="r-seva"></span></div>
            <div class="receipt-row"><span>Donor Name:</span> <span id="r-name"></span></div>
            <div class="receipt-row"><span>Amount Paid:</span> <span id="r-amt" style="font-weight: bold; color: green;"></span></div>
            <div class="receipt-row"><span>Date & Time:</span> <span id="r-time"></span></div>
        </div>

        <!-- Giant Call to Action -->
        <div class="tap-action-btn">
            👉 TAP ANYWHERE TO RETURN TO APP
        </div>

        <div class="instruction-text">
            Chrome Security: Simply touch the screen to safely go back
        </div>
    </div>

    <script>
        // Pre-integrated App credentials
        const APP_ID = "3949236"; 
        const APP_CODE = "0vgon2"; 
        const REFERENCE = "home"; 

        // Secure Native Handoff Function
        function returnToApp() {
            // First Priority: AppCreator24 Deep Linking Protocol (No Play Store redirects)
            window.location.href = `ac24://open${APP_ID}-${APP_CODE}/${REFERENCE}`;

            // Fallback: Webview native scheme
            setTimeout(() => {
                window.location.href = `go:${REFERENCE}`;
            }, 300);
        }

        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const name = urlParams.get('name') || 'Donor';
            const amount = urlParams.get('amount') || '0';
            const seva = urlParams.get('seva') || 'Seva';
            const now = new Date();
            const dateTimeStr = now.toLocaleDateString() + ', ' + now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

            document.getElementById('r-name').innerText = name;
            document.getElementById('r-amt').innerText = '₹' + amount;
            document.getElementById('r-seva').innerText = seva;
            document.getElementById('r-time').innerText = dateTimeStr;

            // Save transaction locally to show in App's Live Feed
            saveDonation(name, amount, dateTimeStr);

            // 1-Second Auto Redirect (In case some devices allow auto launch)
            setTimeout(() => {
                returnToApp();
            }, 1000);
        };

        // 0-Click Alternative: Screen par KAHIN bhi click/touch karne par redirection bypass chalega
        document.addEventListener('click', function() {
            returnToApp();
        });

        document.addEventListener('touchstart', function() {
            returnToApp();
        });

        function saveDonation(name, amount, time) {
            let list = [];
            try {
                let existing = localStorage.getItem('live_donations');
                if (existing) list = JSON.parse(existing);
            } catch(e){}
            list.unshift({ name: name, amount: amount, date: time });
            localStorage.setItem('live_donations', JSON.stringify(list));
        }
    </script>
</body>
</html>
